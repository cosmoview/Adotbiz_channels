<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A.Biz 채널 실적 대시보드</title>
<style>
  :root{--bg:#0f1110;--fg:#f4f6f3;--muted:#9aa39c;--accent:#2d7fff;--line:#262b27;--card:#16191b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--fg);min-height:100vh;padding:32px 20px;
       font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif}
  .wrap{max-width:680px;margin:0 auto}
  .head{display:flex;align-items:center;gap:12px}
  .dot{width:38px;height:38px;border-radius:10px;background:var(--accent);color:#fff;
       display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
  h1{font-size:18px;font-weight:700;letter-spacing:-.4px}
  .sub{color:var(--muted);font-size:13px;margin:6px 0 22px 50px}
  .nav{margin:0 0 20px 50px}
  .nav a{color:var(--accent);font-size:13px;text-decoration:none;cursor:pointer}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .stat{background:var(--card);border-radius:12px;padding:16px}
  .stat .l{font-size:13px;color:var(--muted);margin-bottom:6px}
  .stat .v{font-size:24px;font-weight:800;letter-spacing:-1px}
  .list{display:flex;flex-direction:column;gap:10px}
  .ch{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
      display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
  .ch:hover{border-color:var(--accent)}
  .ch .info{flex:1;min-width:0}
  .ch .name{font-size:14px;font-weight:700}
  .ch .meta{font-size:12px;color:var(--muted);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ch .col{text-align:right;min-width:50px}
  .ch .col .cl{font-size:11px;color:var(--muted)}
  .ch .col .cv{font-size:15px;font-weight:700}
  .ch .col.total .cv{color:var(--accent)}
  .chev{color:#5a615b;font-size:18px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:40px 0}
  .bar{display:flex;gap:10px;margin-top:16px;align-items:center}
  button{font:inherit;cursor:pointer;border-radius:10px;padding:10px 16px;border:1px solid var(--line);
         background:transparent;color:var(--fg);font-size:14px;font-weight:600}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .meta-r{margin-left:auto;color:var(--muted);font-size:12px}

  /* 상세 */
  .detail{display:none}
  .detail.show{display:block}
  .list-view.hide{display:none}
  .back{color:var(--accent);font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;margin-bottom:14px}
  .d-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
  .total-box{border:1px solid #1d3a66;border-radius:12px;padding:14px 16px;margin-bottom:18px;
             background:linear-gradient(180deg,rgba(45,127,255,.08),transparent)}
  .total-box .l{font-size:13px;color:var(--muted)}
  .total-box .v{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:-1px}
  .rows{display:flex;flex-direction:column;gap:2px}
  .drow{display:grid;grid-template-columns:64px 1fr 56px;align-items:center;gap:10px;
        padding:7px 0;border-bottom:1px solid #1c201d}
  .drow .date{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .drow .date .dow{margin-left:5px;font-size:11px}
  .drow.weekend .date{color:#e0a35f}
  .barwrap{height:18px;border-radius:5px;background:#161917;overflow:hidden;display:flex}
  .seg.a{background:var(--accent);height:100%}
  .seg.i{background:#5fa8ff;height:100%}
  .drow .tot{text-align:right;font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
  .drow.zero .tot{color:#4a514b;font-weight:500}
  .legend{display:flex;gap:14px;margin:14px 0;font-size:12px;color:var(--muted)}
  .legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:5px}
  .legend .a{background:var(--accent)}.legend .i{background:#5fa8ff}
  .qrlinks{margin-top:20px}
  .qrlinks .qrgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .qrlinks .qrbox{border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center;background:var(--card)}
  .qrlinks .qrbox h3{font-size:14px;font-weight:700;margin-bottom:12px}
  .qrlinks .qrimg{width:150px;height:150px;margin:0 auto 12px;background:#fff;border-radius:8px;padding:6px}
  .qrlinks .qrimg svg{width:100%;height:100%;display:block}
  .qrlinks .qracts{display:flex;gap:6px;justify-content:center;align-items:center;flex-wrap:wrap}
  .qrlinks .qracts button{padding:7px 12px;font-size:12px;font-weight:600}
  .qrlinks .qracts a{color:var(--accent);text-decoration:none;font-size:12px;font-weight:600}
  .legacy-note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.7;border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--card)}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="dot">A.</div>
    <h1>A.Biz 채널 실적 대시보드</h1>
  </div>
  <div class="sub">채널을 클릭하면 OS별·일자별 상세로 이동합니다.</div>
  <div class="nav"><a href="./generate.html">→ 채널 QR 생성기</a></div>

  <!-- 목록 -->
  <div class="list-view" id="listView">
    <div class="stats">
      <div class="stat"><div class="l">전체 스캔</div><div class="v" id="s-total">…</div></div>
      <div class="stat"><div class="l">활성 채널</div><div class="v" id="s-count">…</div></div>
      <div class="stat"><div class="l">오늘 스캔</div><div class="v" id="s-today">…</div></div>
    </div>
    <div class="list" id="list"><div class="empty">불러오는 중…</div></div>
    <div class="bar">
      <button class="primary" onclick="loadList()">새로고침</button>
      <span class="meta-r" id="updated"></span>
    </div>
  </div>

  <!-- 상세 -->
  <div class="detail" id="detail">
    <a class="back" onclick="goList()">← 채널 목록</a>
    <h1 id="d-name" style="margin-bottom:4px"></h1>
    <div class="sub" id="d-note" style="margin:4px 0 18px 0"></div>
    <div class="total-box">
      <div class="l">전체 합계</div>
      <div class="v" id="d-total">…</div>
    </div>
    <div class="d-stats">
      <div class="stat"><div class="l">Android</div><div class="v" id="d-aos">…</div></div>
      <div class="stat"><div class="l">iPhone</div><div class="v" id="d-ios">…</div></div>
      <div class="stat"><div class="l">오늘</div><div class="v" id="d-today">…</div></div>
    </div>
    <div class="legend"><span><i class="a"></i>Android</span><span><i class="i"></i>iPhone</span></div>
    <div class="rows" id="d-rows"><div class="empty">불러오는 중…</div></div>
    <div class="qrlinks" id="d-qrlinks"></div>
  </div>
</div>

<script src="./vendor/qrcode.js"></script>
<script>
  var BASE = location.origin;
  var DOW = ["일","월","화","수","목","금","토"];

  // ── 기존(레거시) 통합 QR을 특별 채널로 합치기 ──
  // 데이터 출처가 Upstash가 아니라 기존 CountAPI인 채널. 읽기 전용.
  var LEGACY = {
    id: "legacy_unified",          // 목록/상세에서 식별용 (실제 채널 아님)
    label: "기존 통합 QR",
    note: "GitHub Pages + CountAPI (인쇄 배포본)",
    keys: { aos: "skt_abiz_qr_be7712e8_aos", ios: "skt_abiz_qr_be7712e8_ios" },
    countGet: "https://countapi.mileshilliard.com/api/v1/get/",
    startDate: { y: 2026, m: 5, d: 8 } // 일자별 적재 시작일(KST). 기존 대시보드와 동일하게.
  };

  function kstNow(){ var n=new Date(); return new Date(n.getTime()+(n.getTimezoneOffset()*60000)+(9*3600000)); }
  function ymdOf(d){ return ''+d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2); }

  async function legacyRead(key){
    try{
      var r = await fetch(LEGACY.countGet + key, {cache:"no-store"});
      if(r.status === 404) return 0;
      var d = await r.json();
      return parseInt(d.value, 10) || 0;
    }catch(e){ return 0; }
  }

  // 레거시 채널의 누적/오늘 (목록용)
  async function legacySummary(){
    var today = ymdOf(kstNow());
    var res = await Promise.all([
      legacyRead(LEGACY.keys.aos),
      legacyRead(LEGACY.keys.ios),
      legacyRead(LEGACY.keys.aos + "_" + today),
      legacyRead(LEGACY.keys.ios + "_" + today),
    ]);
    var aos=res[0], ios=res[1], taos=res[2], tios=res[3];
    return { id:LEGACY.id, note:LEGACY.note, createdLabel:"기존", createdAt:Number.MAX_SAFE_INTEGER,
             aos:aos, ios:ios, total:aos+ios, _today:taos+tios };
  }

  // 레거시 채널 상세 (일자별)
  async function legacyDetail(){
    var today = kstNow(); today.setHours(0,0,0,0);
    var start = new Date(LEGACY.startDate.y, LEGACY.startDate.m, LEGACY.startDate.d); start.setHours(0,0,0,0);
    if(start.getTime() > today.getTime()) start = new Date(today.getTime());
    var dates = [];
    for(var t=today.getTime(); t>=start.getTime(); t-=86400000) dates.push(new Date(t));
    if(dates.length > 400) dates = dates.slice(0,400);

    var jobs = [];
    dates.forEach(function(d){
      var k = ymdOf(d);
      jobs.push(legacyRead(LEGACY.keys.aos + "_" + k));
      jobs.push(legacyRead(LEGACY.keys.ios + "_" + k));
    });
    var vals = await Promise.all(jobs);
    var days = dates.map(function(d, idx){
      return { date: ymdOf(d), aos: vals[idx*2]||0, ios: vals[idx*2+1]||0 };
    });
    var aosTotal = await legacyRead(LEGACY.keys.aos);
    var iosTotal = await legacyRead(LEGACY.keys.ios);
    return { id:LEGACY.id, note:LEGACY.note, aosTotal:aosTotal, iosTotal:iosTotal, days:days, legacy:true };
  }

  function fmt(n){ return (n||0).toLocaleString(); }

  function buildQR(text){
    for(var type=4; type<=20; type++){
      try{ var qr = qrcode(type,'M'); qr.addData(text); qr.make(); return qr; }catch(e){}
    }
    return null;
  }
  function qrToSvg(text, sizePx){
    var qr = buildQR(text); if(!qr) return null;
    var count = qr.getModuleCount(), cell = 4, margin = 4;
    var dim = count*cell + margin*2, rects = "";
    for(var r=0;r<count;r++) for(var c=0;c<count;c++)
      if(qr.isDark(r,c)) rects += '<rect x="'+(margin+c*cell)+'" y="'+(margin+r*cell)+'" width="'+cell+'" height="'+cell+'"/>';
    var w = sizePx || dim;
    return '<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+w+'" viewBox="0 0 '+dim+' '+dim+'">'+
      '<rect width="'+dim+'" height="'+dim+'" fill="#ffffff"/>'+
      '<g fill="#0f1110" shape-rendering="crispEdges">'+rects+'</g></svg>';
  }
  function dlQR(url, fname, fmt2){
    var svg = qrToSvg(url, 1000); if(!svg) return;
    if(fmt2 === "svg"){
      var blob = new Blob([svg], {type:"image/svg+xml"});
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fname; a.click();
    } else {
      var img = new Image(); var u = URL.createObjectURL(new Blob([svg],{type:"image/svg+xml"}));
      img.onload = function(){
        var cv = document.createElement('canvas'); cv.width=1000; cv.height=1000;
        var ctx = cv.getContext('2d'); ctx.fillStyle="#fff"; ctx.fillRect(0,0,1000,1000);
        ctx.drawImage(img,0,0,1000,1000); URL.revokeObjectURL(u);
        var a = document.createElement('a'); a.href = cv.toDataURL("image/png"); a.download = fname; a.click();
      };
      img.src = u;
    }
  }
  window._dlQR = dlQR;

  async function loadList(){
    var listEl = document.getElementById('list');
    listEl.innerHTML = '<div class="empty">불러오는 중…</div>';
    var data;
    try{
      var r = await fetch(BASE + "/api/channels", {cache:"no-store"});
      data = await r.json();
    }catch(e){
      listEl.innerHTML = '<div class="empty">목록을 불러오지 못했습니다. (API 연결 확인)</div>'; return;
    }
    var chs = data.channels || [];

    // 레거시(기존 통합 QR) 채널을 맨 위에 합침
    var legacy = null;
    try { legacy = await legacySummary(); } catch(e){ legacy = null; }

    var totalAll = data.totalAll || 0;
    var todayAll = data.todayAll || 0;
    var count = chs.length;
    if(legacy){
      totalAll += legacy.total;
      todayAll += legacy._today;
      count += 1;
    }

    document.getElementById('s-total').textContent = fmt(totalAll);
    document.getElementById('s-count').textContent = fmt(count);
    document.getElementById('s-today').textContent = fmt(todayAll);

    // 렌더할 채널 배열: 레거시 먼저, 그다음 일반 채널
    var rows = [];
    if(legacy){
      rows.push({ id: legacy.id, display: LEGACY.label, note: legacy.note,
                  createdLabel: legacy.createdLabel, aos: legacy.aos, ios: legacy.ios, total: legacy.total, isLegacy:true });
    }
    chs.forEach(function(c){
      rows.push({ id: c.id, display: c.id, note: c.note, createdLabel: c.createdLabel,
                  aos: c.aos, ios: c.ios, total: c.total, isLegacy:false });
    });

    if(rows.length === 0){
      listEl.innerHTML = '<div class="empty">아직 생성된 채널이 없습니다. 생성기에서 채널을 만들어 보세요.</div>';
    } else {
      listEl.innerHTML = "";
      rows.forEach(function(c){
        var div = document.createElement('div');
        div.className = "ch";
        div.onclick = function(){ location.hash = "ch=" + encodeURIComponent(c.id); };
        var badge = c.isLegacy ? ' <span class="pill">기존</span>' : '';
        var metaLine = (c.note ? c.note : "") + (c.isLegacy ? "" : (" · 생성 " + (c.createdLabel||"")));
        div.innerHTML =
          '<div class="info"><div class="name">'+c.display+badge+'</div>'+
          '<div class="meta">'+metaLine+'</div></div>'+
          '<div class="col"><div class="cl">Android</div><div class="cv">'+fmt(c.aos)+'</div></div>'+
          '<div class="col"><div class="cl">iPhone</div><div class="cv">'+fmt(c.ios)+'</div></div>'+
          '<div class="col total"><div class="cl">합계</div><div class="cv">'+fmt(c.total)+'</div></div>'+
          '<span class="chev">›</span>';
        listEl.appendChild(div);
      });
    }
    var now = new Date();
    document.getElementById('updated').textContent =
      "업데이트 " + now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  }

  async function loadDetail(id){
    var isLegacy = (id === LEGACY.id);
    document.getElementById('d-name').textContent = isLegacy ? LEGACY.label : id;
    document.getElementById('d-note').textContent = "";
    document.getElementById('d-rows').innerHTML = '<div class="empty">불러오는 중…</div>';
    ['d-total','d-aos','d-ios','d-today'].forEach(function(k){ document.getElementById(k).textContent="…"; });

    var data;
    try{
      if(isLegacy){
        data = await legacyDetail();
      } else {
        var r = await fetch(BASE + "/api/channel?ch=" + encodeURIComponent(id), {cache:"no-store"});
        if(!r.ok) throw new Error("HTTP " + r.status);
        data = await r.json();
      }
    }catch(e){
      document.getElementById('d-rows').innerHTML = '<div class="empty">상세를 불러오지 못했습니다.</div>'; return;
    }

    document.getElementById('d-note').textContent = data.note || "";
    document.getElementById('d-total').textContent = fmt(data.aosTotal + data.iosTotal);
    document.getElementById('d-aos').textContent = fmt(data.aosTotal);
    document.getElementById('d-ios').textContent = fmt(data.iosTotal);

    var days = data.days || [];
    var todayRow = days.length ? days[0] : {aos:0,ios:0};
    document.getElementById('d-today').textContent = fmt((todayRow.aos||0)+(todayRow.ios||0));

    var maxTot = 1;
    days.forEach(function(d){ var t=(d.aos||0)+(d.ios||0); if(t>maxTot) maxTot=t; });

    var rowsEl = document.getElementById('d-rows');
    if(days.length === 0){ rowsEl.innerHTML = '<div class="empty">데이터가 없습니다.</div>'; }
    else {
      var html = "";
      days.forEach(function(d){
        var dt = new Date(d.date.slice(0,4), +d.date.slice(4,6)-1, d.date.slice(6,8));
        var dow = dt.getDay(), weekend = (dow===0||dow===6);
        var a = d.aos||0, i = d.ios||0, tot = a+i;
        var label = d.date.slice(4,6)+"/"+d.date.slice(6,8);
        html += '<div class="drow'+(weekend?' weekend':'')+(tot===0?' zero':'')+'">'+
          '<div class="date">'+label+'<span class="dow">'+DOW[dow]+'</span></div>'+
          '<div class="barwrap" title="Android '+a+' / iPhone '+i+'">'+
            '<div class="seg a" style="width:'+(a/maxTot*100)+'%"></div>'+
            '<div class="seg i" style="width:'+(i/maxTot*100)+'%"></div>'+
          '</div>'+
          '<div class="tot">'+fmt(tot)+'</div></div>';
      });
      rowsEl.innerHTML = html;
    }

    if(isLegacy){
      document.getElementById('d-qrlinks').innerHTML =
        '<div class="legacy-note">이 채널은 기존에 인쇄·배포된 통합 QR의 누적 실적입니다. ' +
        '기존 시스템(GitHub Pages + CountAPI)에서 읽어오며, 여기서 QR을 새로 발급하지 않습니다.</div>';
    } else {
      var urlA = BASE + "/go?ch=" + encodeURIComponent(id) + "&os=aos";
      var urlI = BASE + "/go?ch=" + encodeURIComponent(id) + "&os=ios";
      var svgA = qrToSvg(urlA, 150) || "QR 오류";
      var svgI = qrToSvg(urlI, 150) || "QR 오류";
      document.getElementById('d-qrlinks').innerHTML =
        '<div class="qrgrid">'+
          '<div class="qrbox"><h3>Android</h3><div class="qrimg">'+svgA+'</div>'+
            '<div class="qracts">'+
              '<button onclick="_dlQR(\''+urlA+'\',\'abiz_qr_'+id+'_aos.png\',\'png\')">PNG</button>'+
              '<button onclick="_dlQR(\''+urlA+'\',\'abiz_qr_'+id+'_aos.svg\',\'svg\')">SVG</button>'+
              '<a href="'+urlA+'" target="_blank" rel="noopener">열기 ↗</a>'+
            '</div></div>'+
          '<div class="qrbox"><h3>iPhone</h3><div class="qrimg">'+svgI+'</div>'+
            '<div class="qracts">'+
              '<button onclick="_dlQR(\''+urlI+'\',\'abiz_qr_'+id+'_ios.png\',\'png\')">PNG</button>'+
              '<button onclick="_dlQR(\''+urlI+'\',\'abiz_qr_'+id+'_ios.svg\',\'svg\')">SVG</button>'+
              '<a href="'+urlI+'" target="_blank" rel="noopener">열기 ↗</a>'+
            '</div></div>'+
        '</div>';
    }
  }

  function goList(){ location.hash = ""; }

  function route(){
    var m = location.hash.match(/ch=([^&]+)/);
    if(m){
      var id = decodeURIComponent(m[1]);
      document.getElementById('listView').classList.add('hide');
      document.getElementById('detail').classList.add('show');
      loadDetail(id);
    } else {
      document.getElementById('detail').classList.remove('show');
      document.getElementById('listView').classList.remove('hide');
      loadList();
    }
  }

  window.addEventListener('hashchange', route);
  route();
</script>
</body>
</html>
